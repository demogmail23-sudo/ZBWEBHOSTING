<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover" />
    <title>Login - ZAINU HOST | Ultimate Hosting Platform</title>
    <style>
        /* ========== COMPLETE CSS WITH ANIMATIONS ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        @keyframes bgPulse {
            0% { opacity: 0.3; }
            50% { opacity: 0.6; }
            100% { opacity: 0.3; }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        @keyframes glow {
            0% { box-shadow: 0 0 5px rgba(0, 212, 255, 0.5); }
            100% { box-shadow: 0 0 20px rgba(0, 212, 255, 0.8); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Inter', sans-serif;
            background: linear-gradient(135deg, #05060a 0%, #0a0f1a 50%, #05060a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background Elements */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
        }

        .orb-1 { width: 300px; height: 300px; background: #00d4ff; top: -100px; left: -100px; opacity: 0.15; animation: float 20s infinite; }
        .orb-2 { width: 400px; height: 400px; background: #0066ff; bottom: -150px; right: -150px; opacity: 0.1; animation: float 25s infinite reverse; }
        .orb-3 { width: 200px; height: 200px; background: #00ff88; top: 50%; left: 50%; opacity: 0.08; animation: float 15s infinite; }

        .card {
            background: rgba(12, 17, 29, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 45px 40px;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            animation: slideIn 0.6s ease-out;
            position: relative;
            z-index: 10;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #00d4ff, #0066ff, #00d4ff);
            border-radius: 32px 32px 0 0;
        }

        .logo {
            text-align: center;
            font-size: 42px;
            font-weight: 900;
            background: linear-gradient(135deg, #00d4ff, #0066ff, #00d4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .logo-sub {
            text-align: center;
            font-size: 12px;
            color: #00d4ff;
            letter-spacing: 3px;
            margin-bottom: 5px;
        }

        .tagline {
            text-align: center;
            color: #a0aec0;
            font-size: 13px;
            margin-bottom: 35px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
        }

        h2 {
            text-align: center;
            color: #00d4ff;
            margin-bottom: 25px;
            font-size: 24px;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #a0aec0;
            font-size: 13px;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 15px 18px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(0, 212, 255, 0.2);
            border-radius: 14px;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
            background: rgba(0, 0, 0, 0.8);
        }

        .input-group input:hover {
            border-color: rgba(0, 212, 255, 0.5);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
            cursor: pointer;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #00d4ff;
        }

        .checkbox-group label {
            color: #a0aec0;
            font-size: 13px;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00d4ff, #0066ff);
            border: none;
            border-radius: 14px;
            color: #000;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 136, 255, 0.4);
        }

        button:active {
            transform: translateY(1px);
        }

        .message {
            padding: 14px;
            margin-top: 20px;
            border-radius: 12px;
            text-align: center;
            display: none;
            font-size: 14px;
            font-weight: 500;
            animation: slideIn 0.3s ease-out;
        }

        .error { 
            background: rgba(255, 68, 68, 0.15); 
            border: 1px solid #ff4444; 
            color: #ff8888; 
        }
        
        .success { 
            background: rgba(0, 255, 136, 0.15); 
            border: 1px solid #00ff88; 
            color: #00ff88; 
        }
        
        .info { 
            background: rgba(0, 212, 255, 0.15); 
            border: 1px solid #00d4ff; 
            color: #00d4ff; 
        }

        .admin-hint {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid #FFD700;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 25px;
            text-align: center;
            display: none;
            animation: glow 2s infinite;
        }

        .admin-hint h4 {
            color: #FFD700;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .admin-hint p {
            color: #a0aec0;
            font-size: 12px;
        }

        .admin-hint code {
            background: rgba(0, 0, 0, 0.5);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            color: #FFD700;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
            font-size: 11px;
            color: #4a5568;
        }

        .footer-links a {
            color: #4a5568;
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: #00d4ff;
        }

        @media (max-width: 480px) {
            .card { padding: 30px 25px; }
            .logo { font-size: 32px; }
            h2 { font-size: 20px; }
            .input-group input { padding: 12px 15px; }
            button { padding: 14px; }
        }

        @media (max-width: 380px) {
            .card { padding: 25px 20px; }
            .logo { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <div class="card">
        <div class="logo">🚀 ZAINU HOST</div>
        <div class="logo-sub">POWERED BY CLOUD</div>
        <div class="tagline">Professional Hosting Platform • 100+ Features • 99.9% Uptime</div>
        
        <div class="admin-hint" id="adminHint">
            <h4>👑 ADMIN ACCESS DETECTED</h4>
            <p>Welcome back, Administrator!</p>
            <p><code>Default Password: 8057558009</code></p>
        </div>
        
        <h2>🔐 SECURE LOGIN</h2>
        
        <div class="input-group">
            <label>👤 USERNAME</label>
            <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
        </div>
        
        <div class="input-group">
            <label>🔒 PASSWORD</label>
            <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
        </div>
        
        <div class="checkbox-group">
            <input type="checkbox" id="rememberMe">
            <label>✅ Remember me for 30 days (Stay logged in)</label>
        </div>
        
        <button id="loginBtn" onclick="handleLogin()">
            <span id="loginText">✨ ACCESS DASHBOARD ✨</span>
            <div id="loginSpinner" style="display:none; width:20px; height:20px; border:2px solid rgba(0,0,0,0.3); border-top-color:#000; border-radius:50%; animation:spin 1s linear infinite; margin:0 auto;"></div>
        </button>
        
        <div id="messageBox" class="message"></div>
        
        <div class="footer-links">
            <a href="#">Terms of Service</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Support</a>
        </div>
    </div>

    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>

    <script>
        // ========== COMPLETE LOGIN SCRIPT ==========
        
        // Show/Hide admin hint
        document.getElementById('username').addEventListener('input', function(e) {
            const adminHint = document.getElementById('adminHint');
            if (e.target.value.toLowerCase() === 'zainu121') {
                adminHint.style.display = 'block';
                adminHint.style.animation = 'glow 2s infinite';
            } else {
                adminHint.style.display = 'none';
            }
        });

        // Enter key support
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });

        async function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            // Validation
            if (!username || !password) {
                showMessage('❌ Please enter both username and password', 'error');
                return;
            }
            
            if (username.length < 3) {
                showMessage('❌ Username must be at least 3 characters', 'error');
                return;
            }
            
            if (password.length < 4) {
                showMessage('❌ Invalid password format', 'error');
                return;
            }
            
            // Show loading state
            const btn = document.getElementById('loginBtn');
            const text = document.getElementById('loginText');
            const spinner = document.getElementById('loginSpinner');
            
            text.style.display = 'none';
            spinner.style.display = 'block';
            btn.disabled = true;
            btn.style.opacity = '0.7';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ 
                        username: username, 
                        password: password, 
                        remember_me: rememberMe 
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage('✅ Login successful! Redirecting to dashboard...', 'success');
                    
                    // Redirect based on admin status
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 800);
                } else {
                    showMessage('❌ ' + data.message, 'error');
                    resetButton();
                }
                
            } catch (error) {
                console.error('Login error:', error);
                showMessage('⚠️ Network error. Please check your connection.', 'error');
                resetButton();
            }
        }
        
        function resetButton() {
            const btn = document.getElementById('loginBtn');
            const text = document.getElementById('loginText');
            const spinner = document.getElementById('loginSpinner');
            
            text.style.display = 'inline';
            spinner.style.display = 'none';
            btn.disabled = false;
            btn.style.opacity = '1';
        }
        
        function showMessage(message, type) {
            const msgBox = document.getElementById('messageBox');
            msgBox.textContent = message;
            msgBox.className = `message ${type}`;
            msgBox.style.display = 'block';
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                msgBox.style.display = 'none';
            }, 5000);
        }
        
        // Check if already logged in
        async function checkExistingSession() {
            try {
                const response = await fetch('/api/current_user');
                const data = await response.json();
                if (data.success) {
                    window.location.href = '/';
                }
            } catch(e) {
                // Not logged in, stay on login page
            }
        }
        
        checkExistingSession();
    </script>
</body>
</html>
